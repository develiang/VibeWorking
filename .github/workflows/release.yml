name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_VERSION: ${{ github.ref_name }}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Self-Contained
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:SatelliteResourceLanguages=zh-Hans
          -o ./artifacts/self-contained

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $version = "${{ env.APP_VERSION }}"
          $zipName = "InputStats-$version-portable.zip"
          Compress-Archive -Path ./artifacts/self-contained/* -DestinationPath ./artifacts/$zipName -Force
          Write-Output "Created $zipName"
          Get-ChildItem ./artifacts/*.zip | Select-Object Name, Length

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/InputStats-*-portable.zip
          body: |
            ## 下载

            | 文件 | 说明 |
            |------|------|
            | `InputStats-${{ env.APP_VERSION }}-portable.zip` | **绿色版 / 便携版**：解压即用，无需安装 |

            ## 系统要求
            - Windows 10/11 x64
            - 已包含 .NET 8 运行时，无需额外安装

            ## 使用说明
            1. 下载 ZIP 文件
            2. 解压到任意目录
            3. 运行 `InputStats.exe`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
